# =============================================================================
# VRAGENT — Hermes config (source of truth)
# Copied to %HERMES_HOME%\config.yaml by scripts\sync-overlay.ps1.
# Secrets live in home\.env (never here).
# =============================================================================

# ---------------------------------------------------------------------------
# Model — multi-provider. OpenRouter is the broad gateway (one key → 200+
# models); Anthropic/Nous/OpenAI/etc. all work too. Switch live: `hermes model`.
# ---------------------------------------------------------------------------
model:
  default: "anthropic/claude-opus-4.6"   # strong reasoning for tax/consulting; swap with `hermes model`
  provider: "auto"                        # auto-detect from whichever keys are in home/.env
  base_url: "https://openrouter.ai/api/v1"

# ---------------------------------------------------------------------------
# Agent behavior — tuned for deep, multi-step professional work.
# ---------------------------------------------------------------------------
agent:
  max_turns: 80                # generous headroom for long research/bookkeeping chains
  reasoning_effort: "high"     # OpenRouter/Nous: think hard by default (override per task)
  verbose: false

# ---------------------------------------------------------------------------
# Terminal — local execution on this Windows machine.
# ---------------------------------------------------------------------------
terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  home_mode: "auto"
  lifetime_seconds: 300

# ---------------------------------------------------------------------------
# Skills — domain pack lives in the tracked overlay (read-only external dir).
# Agent-authored skills still write to %HERMES_HOME%\skills.
# ---------------------------------------------------------------------------
skills:
  creation_nudge_interval: 8          # review/save skills more often (was 15) — learn faster
  external_dirs:
    - "C:/Users/VR/Projects/VRAGENT/vr-overlay/skills"

# ---------------------------------------------------------------------------
# Memory — cross-session learning. Agent curates MEMORY.md (its notes) and
# USER.md (about Valentino) under home/memories. Seeded from vr-overlay/memory.
# ---------------------------------------------------------------------------
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 6                   # remind to save memories every 6 turns (was 10)
  flush_min_turns: 3                  # save before context is lost sooner (was 6)
  # provider: honcho                  # optional AI-native user modeling (needs honcho-ai + key)

# ---------------------------------------------------------------------------
# Curator — background skill-library maintenance + consolidation into umbrellas.
# ---------------------------------------------------------------------------
curator:
  enabled: true
  interval_hours: 72
  min_idle_hours: 1
  stale_after_days: 30
  archive_after_days: 90
  consolidate: true                   # LLM pass to merge overlapping skills into umbrellas

# ---------------------------------------------------------------------------
# Delegation — parallel subagents for big multi-part jobs (research, audits,
# batch bookkeeping). Cost scales with concurrency; kept sane + safe-by-default.
# ---------------------------------------------------------------------------
delegation:
  max_concurrent_children: 6
  max_spawn_depth: 2                  # allow orchestrator -> worker fan-out
  subagent_auto_approve: false        # never auto-approve dangerous cmds in children

# ---------------------------------------------------------------------------
# Toolsets — CLI gets the full power set (browser, code exec, delegation,
# session recall, vision/video, mixture-of-agents). Slack mirrors hermes-slack.
# A tool is only USED when relevant, so breadth here costs nothing idle.
# ---------------------------------------------------------------------------
platform_toolsets:
  cli: [hermes-cli, browser, code_execution, delegation, session_search, video, video_gen, moa]
  slack: [hermes-slack]

# ---------------------------------------------------------------------------
# MCP servers — external tools exposed to the agent.
#   desktop   : Windows GUI control (this repo's net-new server) — ACTIVE.
#   quickbooks / karboncopy / lacerte / tax-rag / vr-ledger are staged in
#   vr-overlay/config/mcp_servers.staged.yaml and merged in once each target
#   is built and its secret is in home/.env (Phase 3).
# ---------------------------------------------------------------------------
mcp_servers:
  # Windows GUI control (this repo's net-new server).
  desktop:
    command: "C:/Users/VR/Projects/VRAGENT/hermes-agent/.venv/Scripts/python.exe"
    args: ["C:/Users/VR/Projects/VRAGENT/vr-overlay/mcp/desktop-control/server.py"]
    timeout: 120

  # Bookkeeping — QuickBooks Desktop. Defaults to SAFE simulation mode.
  # Switch to live books by editing vr-overlay/mcp/launchers/quickbooks.cmd.
  quickbooks:
    command: "cmd"
    args: ["/c", "C:/Users/VR/Projects/VRAGENT/vr-overlay/mcp/launchers/quickbooks.cmd"]
    timeout: 180

  # Practice management — KarbonCopy (uses its own .env.local + SQLite db).
  karboncopy:
    command: "cmd"
    args: ["/c", "C:/Users/VR/Projects/VRAGENT/vr-overlay/mcp/launchers/karboncopy.cmd"]
    timeout: 180

  # Bookkeeping ledger — VR-Ledger plain-text double-entry engine (in-process).
  vr-ledger:
    command: "C:/Users/VR/Projects/VRAGENT/hermes-agent/.venv/Scripts/python.exe"
    args: ["C:/Users/VR/Projects/VRAGENT/vr-overlay/mcp/vr-ledger/server.py"]
    timeout: 120

  # --- Staged (enable once prerequisites are met) -------------------------
  # Tax — Lacerte (LacertMCP, .NET). Needs the dotnet SDK working + a built
  # server exe/dll. Add a launchers/lacerte.cmd that runs it, then uncomment:
  # lacerte:
  #   command: "cmd"
  #   args: ["/c", "C:/Users/VR/Projects/VRAGENT/vr-overlay/mcp/launchers/lacerte.cmd"]
  #   timeout: 180
  #
  # Tax research KB — tax-rag-app (FastAPI, not MCP-native). Either expose its
  # API as an http MCP, or run its backend and reach it via the browser/web
  # tools. Wire once an adapter or endpoint exists:
  # tax-rag:
  #   url: "http://127.0.0.1:8000/mcp"
  #
  # Bookkeeping ledger — vr-ledger (FastAPI). Locate the project, then wire
  # like tax-rag (http) or via a small stdio adapter.

# ---------------------------------------------------------------------------
# Display / branding — RealDeal CPA: black / white / green (Apple-clean).
# ---------------------------------------------------------------------------
display:
  compact: false
  tool_progress: all
  skin: realdealcpa          # CLI/TUI skin (vr-overlay/skins/realdealcpa.yaml)

dashboard:
  theme: realdealcpa         # web dashboard theme (vr-overlay/dashboard-themes/realdealcpa.yaml)
